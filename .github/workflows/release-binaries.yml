name: Build Release Binaries

on:
  release:
    types: [published]
  schedule:
    # 每月 1 号 UTC 00:00 自动构建
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: cyborg-bot-linux
            ext: ''
          - os: windows-latest
            artifact: cyborg-bot.exe
            ext: .exe
          - os: macos-latest
            artifact: cyborg-bot-mac
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd frontend && npm ci && cd ..

      - name: Build frontend
        run: cd frontend && npm run build && cd ..

      - name: Bundle assets & compile TypeScript
        run: |
          node scripts/bundle-assets.js
          npx tsc

      - name: Compile binary
        shell: bash
        run: bun build ./dist/index.js --compile --external prismarine-viewer --external canvas --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}

  # 每月自动构建：将三个平台的可执行文件打包发布到 "nightly" Release
  publish-nightly:
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Delete old nightly release
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: 'Nightly Build'
          body: |
            ## 每月自动构建

            构建时间: ${{ github.event.schedule || '手动触发' }}

            这是由 GitHub Actions 每月自动构建的版本。包含最新的代码变更。

            ### 下载

            | 系统 | 文件 |
            |------|------|
            | Windows | `cyborg-bot.exe` |
            | macOS | `cyborg-bot-mac` |
            | Linux | `cyborg-bot-linux` |

            下载后双击运行（或终端执行），打开 `http://localhost:3000` 即可使用。
          prerelease: true
          files: |
            artifacts/cyborg-bot.exe/cyborg-bot.exe
            artifacts/cyborg-bot-mac/cyborg-bot-mac
            artifacts/cyborg-bot-linux/cyborg-bot-linux