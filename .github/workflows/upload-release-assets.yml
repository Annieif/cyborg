name: Upload Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v1.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: cyborg-bot-linux
          - os: macos-latest
            artifact: cyborg-bot-mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd frontend && npm ci && cd ..

      - name: Build frontend
        run: cd frontend && npm run build && cd ..

      - name: Bundle assets & compile TypeScript
        run: |
          node scripts/bundle-assets.js
          npx tsc

      - name: Compile binary
        shell: bash
        run: bun build ./dist/index.js --compile --external prismarine-viewer --external canvas --outfile ${{ matrix.artifact }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.inputs.release_tag }} ${{ matrix.artifact }} --clobber